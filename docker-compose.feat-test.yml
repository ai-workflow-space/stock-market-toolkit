services:
  postgres:
    image: postgres:16-alpine
    container_name: smt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stocktoolkit
      POSTGRES_USER: stocktoolkit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocktoolkit -d stocktoolkit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: kyleckw/stock-market-toolkit-backend:feat-test
    build:
      context: ./backend
    pull_policy: build
    container_name: smt_backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_URL: postgresql+asyncpg://stocktoolkit:${POSTGRES_PASSWORD}@postgres:5432/stocktoolkit
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: kyleckw/stock-market-toolkit-frontend:feat-test
    build:
      context: ./frontend
      args:
        # Mirror the CI image build (.github/workflows/docker.yml) so a locally
        # built image reports the real version, commit, and build time instead
        # of the Dockerfile fallbacks. Each is overridable from the environment,
        # e.g.  VITE_GIT_SHA=$(git rev-parse --short HEAD) docker compose \
        #         -f docker-compose.feat-test.yml up --build
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.9.3}
        VITE_GIT_SHA: ${VITE_GIT_SHA:-local}
        VITE_BUILD_TIME: ${VITE_BUILD_TIME:-}
    pull_policy: build
    container_name: smt_frontend
    restart: unless-stopped
    ports:
      - "3800:80"
    depends_on:
      - backend

volumes:
  postgres_data: