services:
  backend:
    image: kyleckw/stock-market-toolkit-backend:feat-test
    pull_policy: never
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_URL: postgresql+asyncpg://stocktoolkit:${POSTGRES_PASSWORD}@postgres:5432/stocktoolkit
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    image: kyleckw/stock-market-toolkit-frontend:feat-test
    pull_policy: never
    depends_on:
      - backend