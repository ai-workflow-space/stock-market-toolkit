name: Code Review

on:
  push:
    branches: [main, feat/**]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Get changed files
        id: files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          else
            git diff --name-only HEAD~1 > /tmp/changed_files.txt
          fi
          echo "CHANGED_FILES=$(cat /tmp/changed_files.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT
          cat /tmp/changed_files.txt

      - name: Run OpenCode Review
        env:
          OPENCODE_API_KEY: not-needed
          OPENCODE_BASE_URL: http://172.10.168.100:8000/v1
          CHANGED_FILES: ${{ steps.files.outputs.CHANGED_FILES }}
        run: |
          set +e
          OUTPUT=$(opencode review \
            --model "minimax/MiniMax-M2.7" \
            --no-auto-commits \
            --context "You are reviewing a PR for the Stock Market Toolkit (FastAPI + React, Docker). Check for: code quality, security, Docker build, API correctness. Be concise and actionable. Focus on actual code changes." \
            ./backend ./frontend 2>&1 | tee /tmp/review_output.txt)
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ] && [ -z "$(cat /tmp/review_output.txt)" ]; then
            echo "Review completed with notes (exit code: $EXIT_CODE)" > /tmp/review_output.txt
          fi

      - name: Post review comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = (fs.readFileSync('/tmp/review_output.txt', 'utf8') || 'No review output').slice(0, 4000);
            const files = fs.readFileSync('/tmp/changed_files.txt', 'utf8') || '';
            const prNumber = context.payload.pull_request.number;

            const body = [
              '## Code Review (automated)',
              '',
              '### Changed Files',
              '```',
              files.trim() || 'No changed files detected',
              '```',
              '',
              '### Review Results',
              '',
              output.slice(0, 5000)
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existing = comments.data.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('## Code Review (automated)')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }