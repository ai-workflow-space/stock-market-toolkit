name: Docker Build and Push

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - 'requirements.txt'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docker.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - 'requirements.txt'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docker.yml'

jobs:
  compose-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          POSTGRES_PASSWORD=ci-test-password
          SECRET_KEY=ci-test-secret-key-for-testing-only
          CORS_ORIGINS=http://localhost:3030,http://localhost:5173
          LOG_LEVEL=INFO
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build feat-test images
        run: |
          docker compose -f docker-compose.feat-test.yml build

      - name: Start stack
        run: docker compose -f docker-compose.feat-test.yml up -d

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "Backend is healthy after ${i} iterations"
              exit 0
            fi
            echo "Attempt $i/30: backend not ready yet..."
            sleep 2
          done
          echo "Backend failed to become healthy within 60 seconds"
          docker compose -f docker-compose.feat-test.yml logs backend
          docker compose -f docker-compose.feat-test.yml down
          exit 1

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.feat-test.yml down

  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: compose-verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short SHA
        id: short_sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Get version for build args
        id: version_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          fi

      - name: Backend image metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: kyleckw/stock-market-toolkit-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern=v{{version}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Frontend image metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: kyleckw/stock-market-toolkit-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern=v{{version}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_GIT_SHA=${{ steps.short_sha.outputs.sha }}
            VITE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VITE_APP_VERSION=${{ steps.version_tag.outputs.version }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}