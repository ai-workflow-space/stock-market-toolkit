name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release-please
        run: pip install release-please

      - name: Run release-please
        id: release
        run: |
          release-please manifest \
            --token=${{ secrets.GITHUB_TOKEN }} \
            --release-type=python \
            --package-name=stock-market-toolkit \
            --include-component-in-tag=false

      - name: Discord Release Notification
        if: steps.release.outputs.releases_created == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag_name }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"🚀 *New release ${{ steps.release.outputs.tag_name }}!*\\nhttps://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag_name }}\"}" \
              "$DISCORD_WEBHOOK"
          fi