version: "1"
project:
  name: "Stock Toolkit"
  type: "full-stack-webapp"
  paths:
    architecture: "docs/architecture.md"
    design: "frontend/DESIGN.md"
    backend: "backend/"
    frontend: "frontend/"
  rules:
    # Critical rules OpenCode must never violate
    - id: "no-direct-patch"
      description: "All code changes must go through OpenCode's own implementation agents, not manual edits"
      enforcement: "strict"
    - id: "follow-design-spec"
      description: "UI changes must match frontend/DESIGN.md color palette, spacing, typography, and component specs"
      enforcement: "strict"
    - id: "follow-architecture"
      description: "Backend changes must respect the FastAPI structure defined in docs/architecture.md"
      enforcement: "strict"
    - id: "test-before-commit"
      description: "Every code change must be tested (API endpoint hit, or npm run build) before commit"
      enforcement: "strict"
    - id: "no-emoji-in-ui"
      description: "DESIGN.md §9: No emoji in UI elements. Use SVG or text labels."
      enforcement: "strict"
    - id: "use-css-variables"
      description: "DESIGN.md §11: All colors must use CSS variables from :root, not raw hex in components"
      enforcement: "strict"